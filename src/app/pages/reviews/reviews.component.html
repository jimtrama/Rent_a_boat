<section class="reviews-page">
  <section class="reviews-intro">
    <div>
      <span class="eyebrow">{{ "reviews.title" | translate }}</span>
      <h1 class="section-title">{{ "reviews.heroTitle" | translate }}</h1>
      <p class="section-copy">{{ "reviews.subtitle" | translate }}</p>
    </div>

    <div class="google-badge">
      <img src="/assets/icons/google.png" alt="Google" />
      <strong>5.0</strong>
      <span>{{ "reviews.googleLabel" | translate }}</span>
    </div>
  </section>

  <div class="reviews-grid">
    <article class="card" *ngFor="let item of [1,2,3,4,5,6]">
      <div class="review-top">
        <div class="stars">
          <img src="/assets/icons/star.png" alt="" />
          <img src="/assets/icons/star.png" alt="" />
          <img src="/assets/icons/star.png" alt="" />
          <img src="/assets/icons/star.png" alt="" />
          <img src="/assets/icons/star.png" alt="" />
        </div>
        <img class="google-icon" src="/assets/icons/google.png" alt="" />
      </div>
      <span>{{ ("reviews." + item) | translate }}</span>
    </article>
  </div>

  <div class="cta-row">
    <button (click)="seeMoreClick()">{{ "reviews.more" | translate }}</button>
  </div>
</section>
