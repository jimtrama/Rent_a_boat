<header class="site-header">
  <div class="nav-shell">
    <button class="brand" (click)="navigate('')">
      <img class="logo-img" src="/assets/icons/logo.jpg" alt="Medusa Boat Rental" />
      <span class="brand-copy">
        <strong>Medusa</strong>
        <small>Boat Rental</small>
      </span>
    </button>

    <img class="blades-icon" src="/assets/icons/turbine.png" alt="" />

    <nav class="menu-container" *ngIf="!mobileHeader">
      <button appAnimetable [routerLink]="['/']" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        {{ "header.home" | translate }}
      </button>
      <button appAnimetable [routerLink]="['/fleet']" routerLinkActive="active">
        {{ "header.fleet" | translate }}
      </button>
      <button appAnimetable [routerLink]="['/destinations']" routerLinkActive="active">
        {{ "header.dest" | translate }}
      </button>
      <button appAnimetable [routerLink]="['/reviews']" routerLinkActive="active">
        {{ "header.reviews" | translate }}
      </button>
    </nav>

    <div class="header-actions">
      <div class="language-container">
        <button class="flag" (click)="setEnglish()"><img src="/assets/icons/english.png" alt="English" /></button>
        <button class="flag" (click)="setGreek()"><img src="/assets/icons/greek.png" alt="Greek" /></button>
      </div>

      <button class="mobile-menu-container" *ngIf="mobileHeader" (click)="toggleMobileMenu()">
        <img appAnimetable src="/assets/icons/menu.png" alt="" />
      </button>
    </div>
  </div>

  <app-mobile-header [(open)]="mobileMenuOpen"></app-mobile-header>
</header>
