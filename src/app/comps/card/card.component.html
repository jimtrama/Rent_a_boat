<div class="new-container">
  <div
    style="
      display: flex;
      flex-direction: column;
      justify-content: center;
      margin-top: 20px;
    "
  >
    <div class="imgs-container">
      <img
        (click)="onImgClick(img)"
        [id]="'img-' + i"
        [class]="boatId + '-img' + ' img'"
        *ngFor="let img of boat.imgs; let i = index"
        [src]="'/assets/boats/' + img"
        alt=""
        (touchstart)="onTouchStartImg($event)"
        (touchmove)="onTouchMove($event)"
        (touchend)="onTouchEnd($event)"
      />
    </div>
    <div class="arrows-container">
      <img
        *ngIf="selectedImg != 0"
        class="arrow left-icon"
        (click)="onLeftArrowClick()"
        src="/assets/icons/right-arrow.png"
      />
      <img
        *ngIf="selectedImg != boat.imgs.length - 1"
        class="arrow right-icon"
        (click)="onRightArrowClick()"
        src="/assets/icons/right-arrow.png"
      />
    </div>
  </div>

  <div class="main-container">
    <span
      style="
        font-family: titleFont;
        flex-grow: 1;
        width: 100%;
        font-size: larger;
        font-weight: bold;
      "
      >{{ boat.title }}</span
    >
    <div class="card">
      <div class="bullet"></div>
      <img src="/assets/icons/horse.png" />
      <span class="title">HP:</span>
      <span class="info">{{ boat.hp }}</span>
    </div>
    <div class="card">
      <div style="display: flex; align-items: center; gap: 10px">
        <div class="bullet"></div>
        <img src="/assets/icons/people.png" />
        <span class="title">{{ "fleet.boat.people" | translate }}</span>
      </div>
      <span class="info">{{ boat.people }}</span>
    </div>
    <div class="card">
      <div style="display: flex; align-items: center; gap: 10px">
        <div class="bullet"></div>
        <img src="/assets/icons/ruler.png" />
        <span class="title">{{ "fleet.boat.length" | translate }}</span>
      </div>

      <span class="info">{{ boat.length }}</span>
    </div>
    <div *ngIf="boat.bed" class="card">
      <div class="bullet"></div>
      <img src="/assets/icons/deck-chair.png" />
      <span class="title">{{ "fleet.boat.sundeck" | translate }}</span>
      <span class="info">{{ "fleet.boat.sundeckValue" | translate }}</span>
    </div>
  </div>
</div>
